<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransSync Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Vendor -->
    <script src="vendor/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- <script src="vendor/xlsx.full.min.js"></script> -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    
    <header>
        <div class="container header-content">
            <div class="logo"><i data-lucide="bus"></i> TransSync <span>Pro</span></div>
            <div id="status-badge" style="color: var(--text-muted); font-size: 0.8rem;">Aguardando arquivos...</div>
        </div>
    </header>
    
    <main class="container" style="margin-top: 2rem;">
        
        <!-- 1. Importação -->
        <section class="import-grid">
            <div class="drop-zone" id="drop-gps">
                <input type="file" id="input-gps" class="hidden" accept=".csv">
                <i data-lucide="upload-cloud"></i>
                <strong>Arquivo GPS (CSV)</strong>
                <p style="color: var(--text-muted); font-size: 0.8rem;">Clique para selecionar</p>
            </div>
            <div class="drop-zone" id="drop-pax">
                <input type="file" id="input-pax" class="hidden" accept=".xlsx">
                <i data-lucide="file-spreadsheet"></i>
                <strong>Bilhetagem (XLSX)</strong>
                <p style="color: var(--text-muted); font-size: 0.8rem;">Clique para selecionar</p>
            </div>
        </section>
        
        <section id="company-selector-section" class="exception-box hidden" style="padding: 20px; margin-bottom: 20px;">
            <h3 style="margin-bottom: 10px;">Empresas detectadas</h3>
            <div id="company-checkboxes" style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;"></div>
            <button id="btn-iniciar-processamento" class="action-card" style="background: var(--primary); width: auto; padding: 10px 30px;">
                Sincronizar Operadoras Selecionadas
            </button>
        </section>

        <!-- 2. Resumo -->
        <section id="summary-section" class="dashboard-grid hidden">
            <div class="stat-card">
                <p>Total Passageiros</p>
                <h3 id="stat-total-pax">0</h3>
            </div>
            <div class="stat-card success">
                <p>Conciliados</p>
                <h3 id="stat-assigned-pax">0</h3>
            </div>
            <div class="stat-card warning">
                <p>Pendentes</p>
                <h3 id="stat-unassigned-pax">0</h3>
            </div>
            <div class="stat-card">
                <p>Viagens</p>
                <h3 id="stat-total-trips">0</h3>
            </div>
        </section>

        <!-- 3. Exceções -->
        <section id="exception-section" class="exception-box hidden">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Veículo</label>
                    <input type="text" id="filter-veiculo" placeholder="Ex: 1077">
                </div>
                <div class="filter-group">
                    <label>Linha</label>
                    <input type="text" id="filter-linha" placeholder="Ex: A14">
                </div>
                <div class="filter-group">
                    <label>Início</label>
                    <input type="time" id="filter-inicio">
                </div>
                <div class="filter-group">
                    <label>Fim</label>
                    <input type="time" id="filter-fim">
                </div>
                <button id="filter_btn" class="action-card" style="width: auto; padding: 8px 20px; font-size: 0.8rem; background: var(--primary);">Filtrar</button>
                <button id="clear_btn" class="action-card" style="width: auto; padding: 8px 20px; font-size: 0.8rem; background: var(--bg-input); border: 1px solid var(--border);">Limpar</button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox"></th>
                            <th>Horário</th>
                            <th>Empresa</th>
                            <th>Veículo</th>
                            <th>Linha</th>
                            <th>Tipo</th>
                        </tr>
                    </thead>
                    <tbody id="table-exceptions-body"></tbody>
                </table>
            </div>
            
            <div class="filter-bar" style="justify-content: space-between; background: var(--bg-input);">
                <span id="count-selected" style="font-size: 0.8rem; color: var(--text-muted);">0 selecionados</span>
                <div style="display: flex; gap: 10px;">
                    <select id="select-target-trip" class="filter-group" style="background: var(--bg-card);"></select>
                    <button id="btn-assign" style="background: var(--success); border: none; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer;">Atribuir</button>
                </div>
            </div>
        </section>
        
        <!-- 4. Operações -->
        <section id="actions-section" class="hidden">
            <h2 style="margin-bottom: 1rem;">Operações</h2>
            <div class="actions-grid">
                <button class="action-card" onclick="alert('Analisando...')">
                    <div class="icon-box"><i data-lucide="alert-circle"></i></div>
                    <div><strong>Omissões com PAX</strong><p style="font-size: 0.7rem; color: var(--text-muted);">Verifica erros de GPS</p></div>
                </button>
                <button class="action-card" onclick="alert('Analisando...')">
                    <div class="icon-box" style="color: var(--warning);"><i data-lucide="edit"></i></div>
                    <div><strong>Viagens Editadas</strong><p style="font-size: 0.7rem; color: var(--text-muted);">Sem passageiros</p></div>
                </button>
                <button class="action-card" onclick="alert('Gerando...')">
                    <div class="icon-box" style="color: var(--success);"><i data-lucide="download"></i></div>
                    <div><strong>Resumo Horário</strong><p style="font-size: 0.7rem; color: var(--text-muted);">Exportar CSV</p></div>
                </button>
            </div>
        </section>
    </main>
    
    <div id="loader" class="hidden">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--primary);">Processando dados...</p>
    </div>
    
    <script src="js/settings.js"></script>
    <script src="js/core/DataNormalizer.js"></script>
    <script src="js/core/Parser.js"></script>
    <script src="js/core/Engine.js"></script>
    <script src="js/ui/UIController.js"></script>
    <script src="js/main.js"></script>
    <script>lucide.createIcons();</script>

    <script>
    // Função para vincular o clique do card ao input invisível
    function setupUploadCard(cardId, inputId) {
        const card = document.getElementById(cardId);
        const input = document.getElementById(inputId);

        if (card && input) {
            card.addEventListener('click', () => input.click());
            
            // Impede que o clique no input (quando abrir a janela) 
            // dispare o clique no card novamente (loop)
            input.addEventListener('click', (e) => e.stopPropagation());

            // Opcional: Feedback visual quando seleciona arquivo
            input.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    card.style.borderColor = 'var(--success)';
                    card.querySelector('p').innerText = "Arquivo selecionado: " + e.target.files[0].name;
                }
            });
        }
    }

    // Inicializa os cards
    setupUploadCard('drop-gps', 'input-gps');
    setupUploadCard('drop-pax', 'input-pax');

</script>
</body>
</html>
